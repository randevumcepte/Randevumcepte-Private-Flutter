name: randevu_sistem
description: Vionna Güzellik Salonu Randevu Sistemi Uygulaması
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI ve Icon Paketleri
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.4.0
  google_fonts: ^6.2.1
  line_icons: ^2.0.0
  flutter_svg: ^2.0.5
  flutter_spinkit: ^5.1.0
  auto_size_text: ^3.0.0
  appbar_animated: ^0.0.3
  sticky_headers: ^0.3.0
  flutter_sticky_header: ^0.7.0
  curved_navigation_bar: ^1.0.3
  persistent_bottom_nav_bar: ^6.2.1
  circular_menu: ^4.0.0
  badges: ^3.1.1
  percent_indicator: ^4.2.3

  # Navigation & UI Helpers
  titled_navigation_bar: ^5.0.0-nullsafety.0
  page_transition: ^2.1.0
  introduction_screen: ^3.1.8
  modal_bottom_sheet: ^3.0.0

  # Calendar & Picker
  syncfusion_flutter_calendar: ^29.1.39
  flutter_datetime_picker_plus: ^2.2.0
  time_picker_sheet: ^0.0.2+1


  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  intl_utils: ^2.7.0
  syncfusion_localizations: ^29.1.39

  # Forms, Dropdowns, Filters
  dropdown_search: ^6.0.2
  dropdown_button2: ^2.1.4
  multi_select_flutter: ^4.1.3
  custom_searchable_dropdown: ^2.1.1
  filter_list: ^1.0.2
  dropdown_model_list: ^2.1.5

  # Utils & Helpers
  provider: ^6.1.5+1
  shared_preferences: ^2.0.7
  fluttertoast: ^8.2.12
  path_provider: ^2.1.1
  flutter_screenutil: ^5.7.0
  flutter_keyboard_visibility: ^6.0.0
  flutter_hooks: ^0.21.2
  hexcolor: ^3.0.1
  random_string: ^2.3.1
  spelling_number: ^0.0.4
  rename: ^3.0.2

  # Permissions, Device
  permission_handler: ^12.0.0+1
  device_info_plus: ^10.1.2

  # Image / Media
  image_picker: ^1.0.4
  photo_view: ^0.15.0
  image_cropper: ^9.1.0
  # google_mlkit_text_recognition: ^0.15.0  # Apple deprecated-API reddi yüzünden geçici kapatıldı (OCR dosyaları .bak)
  video_player: ^2.7.2
  chewie: ^1.7.1
  youtube_player_flutter: ^9.0.4

  # WebView, URLƒ
  webview_flutter: ^4.4.1
  url_launcher: ^6.1.11

  # Firebase & Notifications
  firebase_core: ^3.4.0
  firebase_messaging: ^15.2.5
  onesignal_flutter: ^5.3.0

  # Audio / SIP / Background
  audioplayers: ^6.4.0
  flutter_background_service: ^5.1.0

  # PDF & Printing
  pdf: ^3.9.0
  printing: ^5.4.2

  # OTP / Captcha
  local_captcha: ^1.0.1

  # HTTP & API
  dio: ^5.5.0+1
  http: ^1.3.0

  # Misc
  progress_dialog_null_safe: ^3.0.0
  flutter_countdown_timer: ^4.1.0
  syncfusion_flutter_datagrid: ^29.1.39
  flutter_rating_bar: ^4.0.1
  file_picker: ^10.1.2
  csc_picker: ^0.2.7
  flutter_contacts: ^1.1.9+2
  barcode_scan2: ^4.5.1
  flutter_launcher_icons: ^0.14.4
  crop_your_image: ^2.0.0
  sip_ua: ^1.0.1
  html: ^0.15.6
  flutter_native_splash: ^2.4.7
  mask_text_input_formatter: ^2.9.0
  share_plus: ^12.0.1
  connectivity_plus: ^7.0.0
  table_calendar: ^3.2.0
  kalender: ^0.15.0
  fl_chart: ^0.68.0  # veya 0.69.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.2.0



flutter:
  uses-material-design: true
  generate: true

  assets:
    - images/
    - images/vionnaguzellik.png
    - images/vionnaguzellik.png
    - images/ring.mp3
    - images/announcement.png
    - images/hesapsil.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "images/vionnaguzellik.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#ffffff"
  image: images/vionnaguzellik.png
  android: true
  ios: true
  web: false
